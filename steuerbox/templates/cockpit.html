<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Steuerbox</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon-steuerbox.svg', v=favicon_version) }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cockpit.css', v=css_version) }}">
</head>
<body>
  <div class="container">
    <main class="shell">
      <header class="hero">
        <div class="hero-topline">
          <h1>Steuerbox</h1>
          <div class="host-bubble {{ host_role }}" aria-label="Host-Rolle {{ host_role }}">
            <span class="dot"></span>
            <span class="label">{{ host_role }}</span>
          </div>
        </div>
        <p class="hero-sub">Direkte Schaltbefehle mit respektierter Override-Dauer.</p>
      </header>

      <section class="grid">
      <article class="card card-wp">
        <h2>Wärmepumpe</h2>
        <div class="statebar" id="wp-mode"></div>
      </article>

      <article class="card card-wattpilot">
        <h2>Wattpilot</h2>
        <div class="toggle-list">
          <div class="toggle-row">
            <span class="toggle-label">Modus</span>
            <div class="statebar" id="wattpilot-mode"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Laden</span>
            <div class="statebar" id="wattpilot-start-stop"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Strom</span>
            <div class="statebar" id="wattpilot-amp"></div>
          </div>
        </div>
      </article>

      <article class="card card-battery">
        <h2>Batterie</h2>
        <div class="toggle-list">
          <div class="toggle-row">
            <span class="toggle-label">Modus</span>
            <div class="statebar" id="battery-mode"></div>
          </div>
        </div>
      </article>

      <article class="card card-toggles">
        <h2>Weitere Verbraucher:</h2>
        <div class="toggle-list">
          <div class="toggle-row">
            <span class="toggle-label">Heizpatrone</span>
            <div class="statebar" id="hp-toggle"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Klimagerät</span>
            <div class="statebar" id="klima-toggle"></div>
          </div>
          <div class="toggle-row">
            <span class="toggle-label">Lüftung</span>
            <div class="statebar" id="lueftung-toggle"></div>
          </div>
        </div>
      </article>

      <article class="card card-duration">
        <label class="duration-input" for="respektInput">
          Override-Dauer
          <input id="respektInput" type="number" min="{{ min_respekt_s }}" max="{{ max_respekt_s }}" value="{{ default_respekt_s }}">
          s
        </label>
      </article>

      <article class="card card-log">
        <p class="sub">Zuletzt ausgelöste Operator-Intents.</p>
        <pre id="eventLog" class="log"></pre>
      </article>
      </section>
    </main>
  </div>

  <script>
    window.STEUERBOX_CFG = {
      minRespekt: {{ min_respekt_s }},
      maxRespekt: {{ max_respekt_s }}
    };
  </script>
  <script src="{{ url_for('static', filename='js/cockpit.js', v=js_version) }}"></script>
</body>
</html>
