<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Erzeuger — PV-Anlage</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="/static/css/monitoring.css">
    <style>
        /* Erzeuger-spezifische Farben */
        .status-chip.f1 { background: rgba(46,125,50,0.3); }
        .status-chip.f2 { background: rgba(76,175,80,0.25); }
        .status-chip.f3 { background: rgba(129,199,132,0.25); }
        #erzeugerChart {
            width: 100%;
            flex: 1;
            min-height: 0;
            background: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Navigation Bar -->
        <div class="top-nav-bar">
            <div class="nav-left">
                <a href="/" class="nav-main">Flow</a>
                <a href="/monitoring" class="nav-main">Monitoring</a>
                <a href="/analyse" class="nav-main active">Analyse</a>
                <div class="nav-separator"></div>
                <a href="/erzeuger" class="nav-sub active">Erzeuger</a>
                <a href="/verbraucher" class="nav-sub">Verbraucher</a>
                <div class="nav-separator"></div>
                <a href="/analyse/pv" class="nav-sub">PV-Übersicht</a>
                <a href="/analyse/haushalt" class="nav-sub">Haushalt</a>
                <a href="/analyse/amortisation" class="nav-sub">Amortisation</a>
                <div class="nav-separator"></div>
                <button class="active" id="btnViewTag" onclick="switchView('tag')">Tag</button>
                <button id="btnViewMonat" onclick="switchView('monat')">Monat</button>
                <button id="btnViewJahr" onclick="switchView('jahr')">Jahr</button>
                <button id="btnViewGesamt" onclick="switchView('gesamt')">Gesamt</button>
            </div>
            <div class="nav-center">
                <div id="tagNavigation" style="display:flex; gap:4px; align-items:center;">
                    <button onclick="navigate(-1)">&#9664;</button>
                    <button class="date-label" id="tagDateDisplay">Heute</button>
                    <button onclick="navigate(1)">&#9654;</button>
                </div>
                <div id="monatNavigation" style="display:none; gap:4px; align-items:center;">
                    <button onclick="navigate(-1)">&#9664;</button>
                    <button class="date-label" id="monatDateDisplay">Monat</button>
                    <button onclick="navigate(1)">&#9654;</button>
                </div>
                <div id="jahrNavigation" style="display:none; gap:4px; align-items:center;">
                    <button onclick="navigate(-1)">&#9664;</button>
                    <button class="date-label" id="jahrDateDisplay">Jahr</button>
                    <button onclick="navigate(1)">&#9654;</button>
                </div>
                <button class="btn-jetzt" id="btnHeute" onclick="navigateToday()">&#9201; Heute</button>
            </div>
            <div class="nav-right"></div>
        </div>

        <!-- Chart Area -->
        <div class="chart-area">
            <div id="summaryGrid" class="status-bar" style="display:none;"></div>
            <div id="chartLoading" class="loading">Lade Erzeugerdaten...</div>
            <div id="chartError" class="error" style="display:none;"></div>
            <div id="erzeugerChart" style="display:none;"></div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════
        // STATE
        // ═══════════════════════════════════════
        const COLORS = { f1: '#2E7D32', f2: '#4CAF50', f3: '#81C784', gesamt: '#E6DFA8' };
        const NAMES  = { f1: 'F1 (DC1+DC2)', f2: 'F2 (SmartMeter)', f3: 'F3 (SmartMeter)' };

        let currentView = 'tag';
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth() + 1;
        let chart = null;

        const MONTHS_DE = ['Januar', 'Februar', 'März', 'April', 'Mai', 'Juni',
                           'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];

        // ═══════════════════════════════════════
        // VIEW SWITCHING
        // ═══════════════════════════════════════
        function switchView(view) {
            currentView = view;
            ['Tag', 'Monat', 'Jahr', 'Gesamt'].forEach(v => {
                document.getElementById('btnView' + v).classList.remove('active');
            });
            document.getElementById('btnView' + view.charAt(0).toUpperCase() + view.slice(1)).classList.add('active');
            updateNavUI();
            loadData();
        }

        function updateNavUI() {
            // Show/hide navigation groups
            document.getElementById('tagNavigation').style.display = currentView === 'tag' ? 'flex' : 'none';
            document.getElementById('monatNavigation').style.display = currentView === 'monat' ? 'flex' : 'none';
            document.getElementById('jahrNavigation').style.display = currentView === 'jahr' ? 'flex' : 'none';

            const btnHeute = document.getElementById('btnHeute');

            if (currentView === 'tag') {
                document.getElementById('tagDateDisplay').textContent =
                    currentDate.toLocaleDateString('de-DE', { day: '2-digit', month: 'short', year: 'numeric' });
                btnHeute.style.display = '';
            } else if (currentView === 'monat') {
                document.getElementById('monatDateDisplay').textContent =
                    `${MONTHS_DE[currentMonth - 1]} ${currentYear}`;
                btnHeute.style.display = '';
            } else if (currentView === 'jahr') {
                document.getElementById('jahrDateDisplay').textContent = String(currentYear);
                btnHeute.style.display = '';
            } else {
                // Gesamt: no navigation
                btnHeute.style.display = 'none';
            }
        }

        function navigate(delta) {
            if (currentView === 'tag') {
                currentDate.setDate(currentDate.getDate() + delta);
            } else if (currentView === 'monat') {
                currentMonth += delta;
                if (currentMonth > 12) { currentMonth = 1; currentYear++; }
                if (currentMonth < 1) { currentMonth = 12; currentYear--; }
            } else if (currentView === 'jahr') {
                currentYear += delta;
            }
            updateNavUI();
            loadData();
        }

        function navigateToday() {
            const now = new Date();
            currentDate = new Date(now);
            currentYear = now.getFullYear();
            currentMonth = now.getMonth() + 1;
            updateNavUI();
            loadData();
        }

        function formatDateISO(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        // ═══════════════════════════════════════
        // DATA LOADING
        // ═══════════════════════════════════════
        async function loadData() {
            document.getElementById('chartLoading').style.display = 'block';
            document.getElementById('chartError').style.display = 'none';
            document.getElementById('erzeugerChart').style.display = 'none';
            document.getElementById('summaryGrid').style.display = 'none';

            let url;
            if (currentView === 'tag') {
                url = `/api/erzeuger/tag?date=${formatDateISO(currentDate)}`;
            } else if (currentView === 'monat') {
                url = `/api/erzeuger/monat?year=${currentYear}&month=${currentMonth}`;
            } else if (currentView === 'jahr') {
                url = `/api/erzeuger/jahr?year=${currentYear}`;
            } else {
                url = '/api/erzeuger/gesamt';
            }

            try {
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                document.getElementById('chartLoading').style.display = 'none';
                document.getElementById('erzeugerChart').style.display = 'block';
                document.getElementById('summaryGrid').style.display = 'flex';

                updateSummary(data.totals);

                if (currentView === 'tag') {
                    createDayChart(data);
                } else {
                    createBarChart(data);
                }
            } catch (err) {
                document.getElementById('chartLoading').style.display = 'none';
                document.getElementById('chartError').style.display = 'block';
                document.getElementById('chartError').textContent = 'Fehler: ' + err.message;
            }
        }

        // ═══════════════════════════════════════
        // SUMMARY
        // ═══════════════════════════════════════
        function formatEnergy(kwh) {
            if (kwh >= 1000) return `${(kwh / 1000).toFixed(2)} MWh`;
            if (kwh >= 100) return `${kwh.toFixed(0)} kWh`;
            if (kwh >= 10) return `${kwh.toFixed(1)} kWh`;
            return `${kwh.toFixed(2)} kWh`;
        }

        function formatPowerKw(watts) {
            return `${(watts / 1000).toFixed(2)} kW`;
        }

        function updateSummary(totals) {
            if (!totals) return;
            const grid = document.getElementById('summaryGrid');
            const gesamt = totals.gesamt || 0.001;
            const pctF1 = (totals.f1 / gesamt * 100).toFixed(0);
            const pctF2 = (totals.f2 / gesamt * 100).toFixed(0);
            const pctF3 = (totals.f3 / gesamt * 100).toFixed(0);

            grid.innerHTML = `
                <div class="status-chip f1">
                    <span class="label">F1</span>
                    <span class="val">${formatEnergy(totals.f1)}</span>
                    <span class="pct">${pctF1}%</span>
                </div>
                <div class="status-chip f2">
                    <span class="label">F2</span>
                    <span class="val">${formatEnergy(totals.f2)}</span>
                    <span class="pct">${pctF2}%</span>
                </div>
                <div class="status-chip f3">
                    <span class="label">F3</span>
                    <span class="val">${formatEnergy(totals.f3)}</span>
                    <span class="pct">${pctF3}%</span>
                </div>
                <div class="status-chip gesamt">
                    <span class="label">Gesamt</span>
                    <span class="val">${formatEnergy(totals.gesamt)}</span>
                </div>
            `;
        }

        // ═══════════════════════════════════════
        // TAG-CHART (Linien, 5-min)
        // ═══════════════════════════════════════
        function createDayChart(data) {
            if (chart) { chart.dispose(); chart = null; }
            const el = document.getElementById('erzeugerChart');
            chart = echarts.init(el);

            // Feste 24h x-Achse (00:00 bis 23:55, 5-min-Intervalle = 288 Slots)
            const allTimes = [];
            for (let h = 0; h < 24; h++) {
                for (let m = 0; m < 60; m += 5) {
                    allTimes.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
                }
            }

            const dp = data.datapoints;
            const byTime = {};
            dp.forEach(d => {
                const dt = new Date(d.timestamp * 1000);
                const key = `${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
                byTime[key] = d;
            });

            const f1Data = allTimes.map(t => byTime[t] ? byTime[t].p_f1 : null);
            const f2Data = allTimes.map(t => byTime[t] ? byTime[t].p_f2 : null);
            const f3Data = allTimes.map(t => byTime[t] ? byTime[t].p_f3 : null);
            const totalData = allTimes.map(t => {
                const d = byTime[t];
                if (!d) return null;
                if (Number.isFinite(d.p_gesamt)) return d.p_gesamt;
                return (d.p_f1 || 0) + (d.p_f2 || 0) + (d.p_f3 || 0);
            });

            const option = {
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        const timeStr = params[0].axisValue;
                        const d = byTime[timeStr];
                        if (!d) return `<strong>${timeStr}</strong><br/>Keine Daten`;
                        let html = `<strong>${timeStr}</strong><br/><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f1};border-radius:2px;margin-right:5px;"></span>F1: <strong>${formatPowerKw(d.p_f1)}</strong><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f2};border-radius:2px;margin-right:5px;"></span>F2: <strong>${formatPowerKw(d.p_f2)}</strong><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f3};border-radius:2px;margin-right:5px;"></span>F3: <strong>${formatPowerKw(d.p_f3)}</strong><br/>`;
                        const totalPower = Number.isFinite(d.p_gesamt) ? d.p_gesamt : ((d.p_f1 || 0) + (d.p_f2 || 0) + (d.p_f3 || 0));
                        html += `<hr style="border:none;border-top:1px solid #ccc;margin:6px 0;"/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.gesamt};border-radius:2px;margin-right:5px;"></span><strong>Gesamt: ${formatPowerKw(totalPower)}</strong>`;
                        return html;
                    }
                },
                legend: {
                    data: ['F1 (DC1+DC2)', 'F2 (SmartMeter)', 'F3 (SmartMeter)', 'Gesamt'],
                    bottom: 10
                },
                grid: {
                    left: '3%', right: '4%',
                    bottom: '70px', top: '35px',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: allTimes,
                    boundaryGap: false,
                    axisLabel: (function() {
                        const w = window.innerWidth;
                        // Dynamisch: bei schmalen Fenstern weniger Labels
                        const step = w < 500 ? 36 : w < 800 ? 24 : 12;
                        return {
                            interval: function(idx) { return idx % step === 0; },
                            fontSize: w < 500 ? 9 : 11
                        };
                    })()
                },
                yAxis: {
                    type: 'value',
                    name: 'Leistung (kW)',
                    nameLocation: 'end',
                    min: 0,
                    max: function(value) {
                        return Math.min(30000, Math.max(10000, Math.ceil(value.max / 1000) * 1000));
                    },
                    axisLabel: {
                        formatter: function(value) {
                            return `${(value / 1000).toFixed(0)} kW`;
                        }
                    }
                },
                series: [
                    {
                        name: 'F1 (DC1+DC2)',
                        type: 'line',
                        data: f1Data,
                        itemStyle: { color: COLORS.f1 },
                        lineStyle: { width: 2 },
                        smooth: true,
                        symbol: 'none',
                        areaStyle: { color: COLORS.f1, opacity: 0.1 }
                    },
                    {
                        name: 'F2 (SmartMeter)',
                        type: 'line',
                        data: f2Data,
                        itemStyle: { color: COLORS.f2 },
                        lineStyle: { width: 2 },
                        smooth: true,
                        symbol: 'none',
                        areaStyle: { color: COLORS.f2, opacity: 0.1 }
                    },
                    {
                        name: 'F3 (SmartMeter)',
                        type: 'line',
                        data: f3Data,
                        itemStyle: { color: COLORS.f3 },
                        lineStyle: { width: 2 },
                        smooth: true,
                        symbol: 'none',
                        areaStyle: { color: COLORS.f3, opacity: 0.1 }
                    },
                    {
                        name: 'Gesamt',
                        type: 'line',
                        data: totalData,
                        itemStyle: { color: COLORS.gesamt },
                        lineStyle: { width: 3 },
                        smooth: true,
                        symbol: 'none',
                        areaStyle: { color: COLORS.gesamt, opacity: 0.08 },
                        z: 10
                    }
                ]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => {
                if (!chart) return;
                chart.resize();
                // X-Achsen-Labels dynamisch an neue Breite anpassen
                const w = window.innerWidth;
                const step = w < 500 ? 36 : w < 800 ? 24 : 12;
                chart.setOption({
                    xAxis: {
                        axisLabel: {
                            interval: function(idx) { return idx % step === 0; },
                            fontSize: w < 500 ? 9 : 11
                        }
                    }
                });
            });
        }

        // ═══════════════════════════════════════
        // BAR-CHART (Monat/Jahr/Gesamt)
        // ═══════════════════════════════════════
        function createBarChart(data) {
            if (chart) { chart.dispose(); chart = null; }
            const el = document.getElementById('erzeugerChart');
            chart = echarts.init(el);

            const dp = data.datapoints;
            let labels, unit;

            if (currentView === 'monat') {
                const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
                labels = Array.from({length: daysInMonth}, (_, i) => `${i + 1}.`);
                unit = 'kWh';
            } else if (currentView === 'jahr') {
                const MONATE = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
                labels = MONATE;
                unit = 'kWh';
            } else {
                if (data.year_range) {
                    const minY = data.year_range[0];
                    const maxY = data.year_range[1];
                    labels = [];
                    for (let y = minY; y <= maxY; y++) labels.push(String(y));
                } else {
                    labels = dp.map(d => d.label);
                }
                unit = 'kWh';
            }

            const byKey = {};
            dp.forEach(d => {
                if (currentView === 'monat') byKey[d.day] = d;
                else if (currentView === 'jahr') byKey[d.month] = d;
                else byKey[d.label] = d;
            });

            const f1Data = labels.map((l, i) => {
                const key = currentView === 'monat' ? (i + 1) : (currentView === 'jahr' ? (i + 1) : l);
                const d = byKey[key];
                return d ? d.w_f1 : null;
            });
            const f2Data = labels.map((l, i) => {
                const key = currentView === 'monat' ? (i + 1) : (currentView === 'jahr' ? (i + 1) : l);
                const d = byKey[key];
                return d ? d.w_f2 : null;
            });
            const f3Data = labels.map((l, i) => {
                const key = currentView === 'monat' ? (i + 1) : (currentView === 'jahr' ? (i + 1) : l);
                const d = byKey[key];
                return d ? d.w_f3 : null;
            });

            const option = {
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'shadow' },
                    formatter: function(params) {
                        if (!params || params.length === 0) return '';
                        const idx = params[0].dataIndex;
                        let key, titleStr;

                        if (currentView === 'monat') {
                            const day = idx + 1;
                            key = day;
                            const datum = new Date(currentYear, currentMonth - 1, day);
                            titleStr = datum.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
                        } else if (currentView === 'jahr') {
                            key = idx + 1;
                            titleStr = labels[idx] + ' ' + currentYear;
                        } else {
                            key = labels[idx];
                            titleStr = key;
                        }

                        const d = byKey[key];
                        if (!d) return `<strong>${titleStr}</strong><br/>Keine Daten`;

                        let html = `<strong>${titleStr}</strong><br/><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f1};border-radius:2px;margin-right:5px;"></span>F1: <strong>${formatEnergy(d.w_f1)}</strong><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f2};border-radius:2px;margin-right:5px;"></span>F2: <strong>${formatEnergy(d.w_f2)}</strong><br/>`;
                        html += `<span style="display:inline-block;width:10px;height:10px;background:${COLORS.f3};border-radius:2px;margin-right:5px;"></span>F3: <strong>${formatEnergy(d.w_f3)}</strong><br/>`;
                        html += `<hr style="border:none;border-top:1px solid #ccc;margin:6px 0;"/>`;
                        html += `<strong>Gesamt: ${formatEnergy(d.w_gesamt)}</strong>`;
                        return html;
                    }
                },
                legend: {
                    data: ['F1 (DC1+DC2)', 'F2 (SmartMeter)', 'F3 (SmartMeter)'],
                    bottom: 10
                },
                grid: {
                    left: '3%', right: '4%',
                    bottom: '70px', top: '35px',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: labels,
                    axisLabel: {
                        interval: 0,
                        rotate: labels.length > 15 ? 45 : 0,
                        fontSize: 11
                    }
                },
                yAxis: {
                    type: 'value',
                    name: unit,
                    nameLocation: 'end',
                    axisLabel: { formatter: `{value}` }
                },
                series: [
                    {
                        name: 'F1 (DC1+DC2)',
                        type: 'bar',
                        stack: 'erzeuger',
                        data: f1Data,
                        itemStyle: { color: COLORS.f1 },
                        emphasis: { focus: 'series' }
                    },
                    {
                        name: 'F2 (SmartMeter)',
                        type: 'bar',
                        stack: 'erzeuger',
                        data: f2Data,
                        itemStyle: { color: COLORS.f2 },
                        emphasis: { focus: 'series' }
                    },
                    {
                        name: 'F3 (SmartMeter)',
                        type: 'bar',
                        stack: 'erzeuger',
                        data: f3Data,
                        itemStyle: { color: COLORS.f3 },
                        emphasis: { focus: 'series' }
                    }
                ]
            };

            chart.setOption(option);
            window.addEventListener('resize', () => { if (chart) chart.resize(); });
        }

        // ═══════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════
        updateNavUI();
        loadData();
    </script>

    {% include 'info_overlay.html' %}
</body>
</html>
